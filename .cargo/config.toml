[alias]
# Pleasant aliases — reuse via `cargo <alias>`.
xtask = "run --package xtask --"
ci = "xtask ci"
crates = "xtask crates"

[build]
# Use sparse registry protocol (much faster index ops).
# This has been stable since Rust 1.68 and defaults on recent toolchains.

[term]
color = "auto"

# Fast linkers where possible. Opt-in per host via environment.
# [target.x86_64-unknown-linux-gnu]
# linker = "clang"
# rustflags = ["-C", "link-arg=-fuse-ld=lld"]

# [target.aarch64-apple-darwin]
# rustflags = ["-C", "link-arg=-fuse-ld=/opt/homebrew/opt/llvm/bin/ld64.lld"]
