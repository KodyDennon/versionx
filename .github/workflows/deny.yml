name: cargo-deny

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - "deny.toml"
  schedule:
    - cron: "0 12 * * 1"  # every Monday at 12:00 UTC — catches new advisories

jobs:
  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check ${{ matrix.checks }}
        continue-on-error: ${{ matrix.checks == 'advisories' }}
    strategy:
      fail-fast: false
      matrix:
        checks:
          - bans
          - licenses
          - sources
          - advisories
