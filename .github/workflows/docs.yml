name: docs

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - "crates/**/*.rs"
      - "xtask/**"
      - ".github/workflows/docs.yml"
      - "lychee.toml"
  pull_request:
    paths:
      - "website/**"
      - "crates/**/*.rs"
      - "xtask/**"
      - ".github/workflows/docs.yml"
      - "lychee.toml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Rebuild every auto-generated page; fail if the result drifts from what
  # is committed. Keeps reference docs honest.
  regenerate:
    name: regenerate generated docs (drift check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."
          shared-key: docs

      - name: cargo xtask docs
        run: cargo xtask docs

      - name: git diff --exit-code
        run: |
          if ! git diff --quiet -- website/; then
            echo "::error::Auto-generated docs drifted from committed copy."
            echo "Run \`cargo xtask docs\` locally and commit the result."
            git --no-pager diff -- website/
            exit 1
          fi

  build:
    name: build site
    runs-on: ubuntu-latest
    needs: regenerate
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: npm ci
        working-directory: website
        run: npm ci

      - name: build
        working-directory: website
        run: npm run build

      - name: upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/build

  linkcheck:
    name: lychee (broken-link check)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: restore site build
        uses: actions/download-artifact@v4
        with:
          name: github-pages
          path: website/build

      - name: extract tarball
        working-directory: website/build
        run: |
          tar -xvf artifact.tar || true
          ls -la

      - name: lychee
        uses: lycheeverse/lychee-action@v2
        continue-on-error: true
        with:
          args: >-
            --config ./lychee.toml
            --no-progress
            ./website/build
          fail: false

  deploy:
    name: deploy to GitHub Pages
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [build]
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: deploy
        id: deployment
        uses: actions/deploy-pages@v5
