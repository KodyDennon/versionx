# cargo-deny configuration — run via `cargo deny check`.
# See https://embarkstudios.github.io/cargo-deny/

[graph]
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "aarch64-unknown-linux-gnu" },
    { triple = "x86_64-unknown-linux-musl" },
    { triple = "aarch64-unknown-linux-musl" },
    { triple = "x86_64-apple-darwin" },
    { triple = "aarch64-apple-darwin" },
    { triple = "x86_64-pc-windows-msvc" },
    { triple = "aarch64-pc-windows-msvc" },
]

[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
# Advisories we've reviewed and accept:
# - RUSTSEC-2025-0140 (gix-date TimeBuf::as_str non-utf8 — the
#   renumbered version of the withdrawn 2025-0098): read-only code
#   path in our usage; we never pass user-controlled bytes through it.
# - RUSTSEC-2025-0021 (gitoxide SHA-1 collision detection): we consume
#   already-committed SHAs; collision mitigation is the caller's
#   responsibility. Revisit if gitoxide ships a detecting backend.
ignore = [
    # gix/gitoxide advisories — read-only + trust-on-commit usage.
    "RUSTSEC-2025-0140",
    "RUSTSEC-2025-0021",
    # Unmaintained transitive deps — tracked upstream, no user-facing impact.
    "RUSTSEC-2024-0384", # instant — unmaintained
    "RUSTSEC-2024-0436", # paste — unmaintained
    # Marvin Attack (RSA timing sidechannel). We pull rsa transitively
    # through a sqlite auth path that never sees user-controlled keys.
    "RUSTSEC-2023-0071",
]

[licenses]
version = 2
# Apache-2.0 ecosystem with common permissive companions.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "MPL-2.0",
    # webpki-roots embeds Mozilla's trust anchors under CDLA-Permissive-2.0.
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.93

# Trusted sources only — pulls from non-crates.io require explicit allowlist.
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
# Prefer rustls over native-tls across the workspace.
deny = [
    { name = "openssl", reason = "prefer rustls; use `rustls-tls` feature on reqwest" },
    { name = "openssl-sys", reason = "prefer rustls" },
]
skip-tree = []
